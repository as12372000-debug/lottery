const WEEKDAY_NAMES = ["日","一","二","三","四","五","六"];
const WEEKDAY_FULL = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

function App() {
  const [activeTab, setActiveTab] = useState("missing");
  const [historySearch, setHistorySearch] = useState("");

  // ── 1. 近10期未出號碼 ──────────────────────────────────
  const missingNumbers = useMemo(() => {
    const recent10 = RAW_DATA.slice(0, 10);
    const appeared = new Set(recent10.flatMap(d => d.nums));
    const missing = [];
    for (let i = 1; i <= 39; i++) if (!appeared.has(i)) missing.push(i);
    // 計算每個號碼最後出現距今多少期
    const lastSeen = {};
    RAW_DATA.forEach((d, idx) => d.nums.forEach(n => { if (!(n in lastSeen)) lastSeen[n] = idx; }));
    return missing.map(n => ({ num: n, gap: lastSeen[n] ?? 50 })).sort((a,b) => b.gap - a.gap);
  }, []);

  // ── 2. 每週各天歷史號碼 ────────────────────────────────
  const weekdayHistory = useMemo(() => {
    const map = Array.from({length:7}, () => []);
    RAW_DATA.forEach(d => map[d.weekday].push(d));
    return map;
  }, []);

  // 各天最常出現號碼
  const weekdayFreq = useMemo(() => {
    const map = Array.from({length:7}, () => []);
    RAW_DATA.forEach(d => map[d.weekday].push(d));
    return map.map(draws => {
      const freq = {};
      draws.forEach(d => d.nums.forEach(n => freq[n] = (freq[n]||0)+1));
      return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>({num:+n,cnt:c}));
    });
  }, []);

  // ── 3. 牽引分析（關聯性邏輯）────────────────────────────
  // 核心邏輯：
  // 今天是週X，開出號碼 A,B,C,D,E
  // → 找歷史上所有「同週X也開過 A 或 B 或 C...」的期數
  // → 看那些期數的「隔天」開了什麼號碼
  // → 統計隔天號碼出現頻率 → 頻率高 = 明日關聯號碼
  const tractionAnalysis = useMemo(() => {
    const today = RAW_DATA[0];
    const todayWd = today.weekday;

    // 建立 period → 隔天 的 map
    const nextDayMap = {};
    RAW_DATA.forEach(d => {
      const next = RAW_DATA.find(x => x.period === d.period + 1);
      if (next) nextDayMap[d.period] = next;
    });

    // 對今天每個號碼，找歷史同週幾也有這個號碼的期次（排除今天自己）
    const numAnalysis = today.nums.map(targetNum => {
      // 歷史同週X有出現此號碼的期次
      const matchedPeriods = RAW_DATA.filter(d =>
        d.period !== today.period &&
        d.weekday === todayWd &&
        d.nums.includes(targetNum)
      );

      // 各期的隔天號碼
      const nextDayNums = {};
      const nextDayDetails = [];
      matchedPeriods.forEach(d => {
        const next = nextDayMap[d.period];
        if (next) {
          next.nums.forEach(n => {
            nextDayNums[n] = (nextDayNums[n] || 0) + 1;
          });
          nextDayDetails.push({ src: d, next });
        }
      });

      // 排序頻率
      const freqList = Object.entries(nextDayNums)
        .sort((a,b) => b[1]-a[1])
        .map(([n,c]) => ({ num: +n, cnt: c }));

      return { targetNum, matchedPeriods, nextDayDetails, freqList };
    });

    // 合併所有號碼的隔天頻率（加權：被多個今日號碼牽引到的更強）
    const combinedFreq = {};
    numAnalysis.forEach(({ freqList }) => {
      freqList.forEach(({ num, cnt }) => {
        combinedFreq[num] = (combinedFreq[num] || 0) + cnt;
      });
    });

    const predictedList = Object.entries(combinedFreq)
      .sort((a,b) => b[1]-a[1])
      .slice(0, 15)
      .map(([n,c]) => ({ num: +n, cnt: c }));

    // 被幾個今日號碼同時牽引到（關聯強度）
    const strengthMap = {};
    numAnalysis.forEach(({ targetNum, freqList }) => {
      freqList.forEach(({ num }) => {
        if (!strengthMap[num]) strengthMap[num] = [];
        strengthMap[num].push(targetNum);
      });
    });

    // 明天星期幾
    const nextWd = (todayWd + 1) % 7;
    const nextWdFreq = weekdayFreq[nextWd];

    return { today, numAnalysis, predictedList, strengthMap, nextWd, nextWdFreq };
  }, []);

  // ── 4. 氣場分析（近10期）+ Tesla 3-6-9 ──────────────────
  const auraAnalysis = useMemo(() => {
    const recent10 = RAW_DATA.slice(0, 10);
    const allNums = recent10.flatMap(d => d.nums);

    // 重新取得 tractionAnalysis.predictedList（避免循環依賴）
    const _today = RAW_DATA[0];
    const _todayWd = _today.weekday;
    const _nextDayMap = {};
    RAW_DATA.forEach(d => { const nx = RAW_DATA.find(x => x.period === d.period+1); if(nx) _nextDayMap[d.period]=nx; });
    const _combinedFreq = {};
    _today.nums.forEach(targetNum => {
      RAW_DATA.filter(d => d.period !== _today.period && d.weekday === _todayWd && d.nums.includes(targetNum))
        .forEach(d => { const nx = _nextDayMap[d.period]; if(nx) nx.nums.forEach(n => { _combinedFreq[n] = (_combinedFreq[n]||0)+1; }); });
    });
    const tractionPredicted = Object.entries(_combinedFreq).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([n,c])=>({num:+n,cnt:c}));

    // ── Tesla 3-6-9 工具函數 ──────────────────────────────
    const digitRoot = n => { let r = n; while (r > 9) r = String(r).split('').reduce((a,b)=>a+(+b),0); return r; };
    const is369 = n => [3,6,9].includes(digitRoot(n));
    const get369Type = n => {
      const r = digitRoot(n);
      if (r === 3) return "3";
      if (r === 6) return "6";
      if (r === 9) return "9";
      return null;
    };

    // 近10期 369 統計
    const nums369 = allNums.filter(n => is369(n));
    const nums369Pct = Math.round((nums369.length / allNums.length) * 100);
    const type3Cnt = allNums.filter(n => digitRoot(n) === 3).length;
    const type6Cnt = allNums.filter(n => digitRoot(n) === 6).length;
    const type9Cnt = allNums.filter(n => digitRoot(n) === 9).length;
    const typeOtherCnt = allNums.length - type3Cnt - type6Cnt - type9Cnt;
    // 369 氣場強度
    const max369 = Math.max(type3Cnt, type6Cnt, type9Cnt);
    const hot369Type = type3Cnt >= max369 ? "3" : type6Cnt >= max369 ? "6" : "9";

    // 每期369分布
    const perDraw369 = recent10.map(d => ({
      ...d,
      nums369: d.nums.filter(n => is369(n)),
      numsOther: d.nums.filter(n => !is369(n)),
    }));

    // 所有1-39號碼的369分類
    const allNumsWith369 = Array.from({length:39},(_,i)=>i+1).map(n => ({
      num: n, root: digitRoot(n), is369: is369(n), type: get369Type(n),
    }));

    // 單雙
    const oddCount = allNums.filter(n => n % 2 !== 0).length;
    const evenCount = allNums.filter(n => n % 2 === 0).length;
    const oddPct = Math.round((oddCount / allNums.length) * 100);
    const evenPct = 100 - oddPct;
    const perDrawOddEven = recent10.map(d => ({
      period: d.period, date: d.date, weekday: d.weekday, nums: d.nums,
      odd: d.nums.filter(n => n % 2 !== 0).length,
      even: d.nums.filter(n => n % 2 === 0).length,
    }));

    // 區間
    const zones = [
      { label: "01–10", min: 1,  max: 10,  color: "#0891b2" },
      { label: "11–20", min: 11, max: 20,  color: "#7c3aed" },
      { label: "21–30", min: 21, max: 30,  color: "#065f46" },
      { label: "31–39", min: 31, max: 39,  color: "#92400e" },
    ];
    const zoneCounts = zones.map(z => ({
      ...z,
      cnt: allNums.filter(n => n >= z.min && n <= z.max).length,
      pct: Math.round((allNums.filter(n => n >= z.min && n <= z.max).length / allNums.length) * 100),
    }));
    const maxZone = Math.max(...zoneCounts.map(z => z.cnt));
    const oddBias = oddCount > evenCount ? "odd" : oddCount < evenCount ? "even" : "neutral";
    const hotZones = zoneCounts.filter(z => z.cnt >= maxZone - 1);

    // 10期遺漏
    const recent10nums = new Set(RAW_DATA.slice(0,10).flatMap(d => d.nums));
    const missing10 = [];
    const lastSeen = {};
    RAW_DATA.forEach((d, idx) => d.nums.forEach(n => { if (!(n in lastSeen)) lastSeen[n] = idx; }));
    for (let i = 1; i <= 39; i++) {
      if (!recent10nums.has(i)) missing10.push({ num: i, gap: lastSeen[i] ?? RAW_DATA.length });
    }
    missing10.sort((a, b) => b.gap - a.gap);
    const missing10Set = new Set(missing10.map(x => x.num));
    const maxGap = missing10[0]?.gap || 1;

    // ── 綜合評分加權（含 Tesla 369）────────────────────────
    const maxTractionScore = tractionPredicted[0]?.cnt || 1;

    const auraWeighted = tractionPredicted.map(({ num, cnt }) => {
      let bonus = 0;
      const bonusBreakdown = [];

      // ① 單雙氣場（上限 15%）
      const isOdd = num % 2 !== 0;
      if (oddBias === "odd" && isOdd) { const b = Math.round(cnt * 0.15); bonus += b; bonusBreakdown.push({label:"單雙",val:b}); }
      if (oddBias === "even" && !isOdd) { const b = Math.round(cnt * 0.15); bonus += b; bonusBreakdown.push({label:"單雙",val:b}); }

      // ② 區間氣場（上限 20%）
      const zone = zoneCounts.find(z => num >= z.min && num <= z.max);
      if (zone && zone.cnt >= maxZone) { const b = Math.round(cnt * 0.2); bonus += b; bonusBreakdown.push({label:"熱區",val:b}); }
      else if (zone && zone.cnt >= maxZone - 1) { const b = Math.round(cnt * 0.1); bonus += b; bonusBreakdown.push({label:"次熱",val:b}); }

      // ③ 10期遺漏（比例縮放，上限 20%）
      if (missing10Set.has(num)) {
        const gap = missing10.find(x => x.num === num)?.gap || 1;
        const b = Math.round(maxTractionScore * (gap / maxGap) * 0.2);
        bonus += b; bonusBreakdown.push({label:"遺漏",val:b});
      }

      // ④ Tesla 369 加成
      // 屬於369家族：基礎 +18%
      // 各369類型再依比例加成：該類型占近10期所有號碼的比例 × 0.3 作為額外加成率
      // 例：根3出現12個/50個 = 24%，加成率 = 24% × 0.3 = +7.2%
      const root = digitRoot(num);
      const total369 = type3Cnt + type6Cnt + type9Cnt;
      const rootCountMap = { 3: type3Cnt, 6: type6Cnt, 9: type9Cnt };
      if ([3,6,9].includes(root)) {
        const b369 = Math.round(cnt * 0.18);
        bonus += b369;
        bonusBreakdown.push({label:`369(根${root})`,val:b369});

        const rootPct = total369 > 0 ? rootCountMap[root] / total369 : 0;

        if (bProp > 0) {
          bonus += bProp;
          bonusBreakdown.push({label:`369比例(${Math.round(rootPct*100)}%)`,val:bProp});
        }
      }

      return { num, base: cnt, bonus, total: cnt + bonus, isMissing10: missing10Set.has(num), is369: is369(num), root, bonusBreakdown };
    });

        const isOdd = num % 2 !== 0;

        if (oddBias === "even" && !isOdd) bonus += Math.round(maxTractionScore * 0.05);
        const zone = zoneCounts.find(z => num >= z.min && num <= z.max);
        if (zone && zone.cnt >= maxZone) bonus += Math.round(maxTractionScore * 0.05);
        // 369加成（等比）
        const root = digitRoot(num);
        const total369 = type3Cnt + type6Cnt + type9Cnt;

          const rootPct = total369 > 0 ? (rootCountMap[root] / total369) : 0;
          const b = Math.round(maxTractionScore * (0.1 + rootPct * 0.27));

        }

        auraWeighted.push({ num, base, bonus, total: base + bonus, isMissing10: true, is369: is369(num), root, bonusBreakdown });
      }
    });

                  const isWarm = z.cnt >= maxZone - 1 && !isHot;
                  return (
                    <div key={z.label} style={{
                      borderRadius: 12, padding: "14px 10px", textAlign: "center",
                      background: isHot ? `${ZONE_COLORS[i]}33` : isWarm ? `${ZONE_COLORS[i]}18` : "rgba(255,255,255,0.03)",
                      border: `2px solid ${isHot ? ZONE_COLORS[i] : isWarm ? ZONE_COLORS[i]+"66" : "#1e3a5f"}`,
                    }}>
                      <div style={{ fontSize: 13, fontWeight: 800, color: ZONE_COLORS[i] }}>{z.label}</div>
                      <div style={{ fontSize: 28, fontWeight: 900, color: "#fff", margin: "6px 0" }}>{z.cnt}</div>
                      <div style={{ fontSize: 11, color: "#94a3b8" }}>個 ({z.pct}%)</div>
                      {isHot && <div style={{ fontSize: 10, color: ZONE_COLORS[i], marginTop: 4, fontWeight: 700 }}>🔥 最熱區間 +40%</div>}
                      {isWarm && <div style={{ fontSize: 10, color: ZONE_COLORS[i], marginTop: 4 }}>⚡ 次熱區間 +20%</div>}
                    </div>
                  );
                })}
              </div>

              {/* 區間長條 */}
              <div style={{ display: "flex", height: 24, borderRadius: 12, overflow: "hidden", border: "1px solid #1e3a5f" }}>
                {zoneCounts.map((z, i) => (
                  <div key={z.label} style={{
                    width: `${z.pct}%`, background: ZONE_COLORS[i],
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 10, fontWeight: 700, color: "#fff",
                    minWidth: z.pct > 10 ? "auto" : 0,
                  }}>{z.pct > 12 ? z.label : ""}</div>
                ))}
              </div>
            </div>

            {/* ── 氣場加權後最終預測 ── */}
            <div style={{
              background: "linear-gradient(135deg, #1a1a2e, #16213e)",
              border: "2px solid #f59e0b", borderRadius: 16, padding: 20,
            }}>
              <div style={{ fontSize: 16, fontWeight: 900, color: "#f59e0b", marginBottom: 4 }}>
                🌟 氣場加權最終預測（{WEEKDAY_FULL[nextWd]}）
              </div>
              <div style={{ fontSize: 12, color: "#64748b", marginBottom: 14 }}>
                牽引分數 × 單雙氣場加成 × 區間氣場加成 → 綜合排名
              </div>

              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                {auraWeighted.slice(0, 15).map(({ num, base, bonus, total, is369: numIs369, root: numRoot }, idx) => {
                  const isOdd = num % 2 !== 0;
                  const zoneIdx = num <= 10 ? 0 : num <= 20 ? 1 : num <= 30 ? 2 : 3;
                  const zoneColor = ZONE_COLORS[zoneIdx];
                  const hasBonus = bonus > 0;
                  const rootColor = numRoot === 3 ? "#a855f7" : numRoot === 6 ? "#f59e0b" : numRoot === 9 ? "#34d399" : "#475569";
                  return (
                    <div key={num} style={{ textAlign: "center" }}>
                      <div style={{
                        width: idx < 5 ? 54 : idx < 10 ? 44 : 36,
                        height: idx < 5 ? 54 : idx < 10 ? 44 : 36,
                        lineHeight: idx < 5 ? "54px" : idx < 10 ? "44px" : "36px",
                        textAlign: "center", borderRadius: "50%",
                        fontSize: idx < 5 ? 17 : idx < 10 ? 14 : 12,
                        fontWeight: 900,
                        background: hasBonus
                          ? `radial-gradient(circle, #f59e0b, #d97706)`
                          : `radial-gradient(circle, ${zoneColor}, ${zoneColor}88)`,
                        border: `2px solid ${hasBonus ? "#f59e0b" : zoneColor}`,
                        color: "#fff",
                        boxShadow: idx < 3 ? "0 0 16px rgba(245,158,11,0.5)" : "none",
                      }}>{String(num).padStart(2,"0")}</div>
                      <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 2 }}>{total}分</div>
                      {bonus > 0 && <div style={{ fontSize: 8, color: "#f59e0b" }}>+{bonus}氣</div>}
                      <div style={{ fontSize: 8, color: isOdd ? "#f87171" : "#60a5fa" }}>{isOdd ? "單" : "雙"}</div>
                      {missing10Set.has(num) && <div style={{ fontSize: 8, color: "#ef4444", fontWeight: 700 }}>🔴遺漏</div>}
                      {numIs369 && <div style={{ fontSize: 8, color: rootColor, fontWeight: 700 }}>⚡根{numRoot}</div>}
                    </div>
                  );
                })}
              </div>

              <div style={{ display: "flex", gap: 12, flexWrap: "wrap", fontSize: 11, color: "#64748b" }}>
                <span>🔴 單數</span><span>🔵 雙數</span>
                {zoneCounts.map((z,i) => <span key={i} style={{ color: ZONE_COLORS[i] }}>■ {z.label}</span>)}
                <span style={{color:"#a855f7"}}>⚡根3</span>
                <span style={{color:"#f59e0b"}}>⚡根6</span>
                <span style={{color:"#34d399"}}>⚡根9</span>
                <span style={{ marginLeft: "auto", color: "#f59e0b" }}>⚠️ 僅供娛樂參考</span>
              </div>
            </div>
          </div>
          );
        })()}

        {/* ── TAB 5: 全部頻率 ── */}
        {activeTab === "frequency" && (
          <div>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: "#f59e0b", marginBottom: 6 }}>全部號碼出現頻率統計（50期）</div>
              <div style={{ fontSize: 13, color: "#64748b" }}>1-39號碼在50期中各自出現次數</div>
            </div>

            {/* 長條圖 */}
            <div style={{ background: "#0f1e35", borderRadius: 12, padding: 20, border: "1px solid #1e3a5f", marginBottom: 20 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {Array.from({length:39},(_,i)=>i+1).map(n => {
                  const cnt = allFreq.find(x=>x.num===n)?.cnt || 0;
                  const pct = (cnt / maxFreq) * 100;
                  const isTop5 = allFreq.slice(0,5).some(x=>x.num===n);
                  return (
                    <div key={n} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{
                        width: 32, fontSize: 12, fontWeight: 700, textAlign: "right",
                        color: isTop5 ? "#f59e0b" : "#94a3b8",
                      }}>{String(n).padStart(2,"0")}</span>
                      <div style={{ flex: 1, background: "#1e3a5f", borderRadius: 3, height: 18 }}>
                        <div style={{
                          height: "100%", borderRadius: 3,
                          background: isTop5 ?
                            "linear-gradient(90deg, #f59e0b, #d97706)" :
                            "linear-gradient(90deg, #3b82f6, #1d4ed8)",
                          width: `${pct}%`, minWidth: cnt > 0 ? 4 : 0,
                          transition: "width 0.3s",
                        }} />
                      </div>
                      <span style={{
                        width: 28, fontSize: 12, fontWeight: 700, textAlign: "left",
                        color: isTop5 ? "#f59e0b" : "#94a3b8",
                      }}>{cnt}</span>
                      {isTop5 && <span style={{ fontSize: 10, color: "#f59e0b" }}>🔥</span>}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Top 10 熱號 */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              <div style={{ background: "#0f1e35", borderRadius: 12, padding: 16, border: "1px solid #f59e0b44" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#f59e0b", marginBottom: 12 }}>🔥 Top 10 熱號</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {allFreq.slice(0,10).map(({num,cnt},idx) => (
                    <div key={num} style={{ textAlign: "center" }}>
                      <div style={{
                        width: 44, height: 44, lineHeight: "44px", textAlign: "center",
                        borderRadius: "50%", fontSize: 14, fontWeight: 900,
                        background: `radial-gradient(circle, ${["#d97706","#b45309","#92400e"][Math.min(idx,2)]}, #78350f)`,
                        color: "#fff",
                        boxShadow: idx === 0 ? "0 0 12px rgba(245,158,11,0.6)" : "none",
                      }}>{String(num).padStart(2,"0")}</div>
                      <div style={{ fontSize: 10, color: "#f59e0b", marginTop: 2 }}>{cnt}次</div>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{ background: "#0f1e35", borderRadius: 12, padding: 16, border: "1px solid #3b82f644" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#60a5fa", marginBottom: 12 }}>❄️ Top 10 冷號（出現最少）</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {allFreq.slice(-10).reverse().map(({num,cnt},idx) => (
                    <div key={num} style={{ textAlign: "center" }}>
                      <div style={{
                        width: 44, height: 44, lineHeight: "44px", textAlign: "center",
                        borderRadius: "50%", fontSize: 14, fontWeight: 900,
                        background: `radial-gradient(circle, #1e3a8a, #1e40af)`,
                        color: "#bfdbfe",
                        border: "1px solid #3b82f6",
                      }}>{String(num).padStart(2,"0")}</div>
                      <div style={{ fontSize: 10, color: "#60a5fa", marginTop: 2 }}>{cnt}次</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ── TAB 6: 歷史開獎紀錄 ── */}
        {activeTab === "history" && (() => {
          const COLORS = ["#1d4ed8","#0891b2","#065f46","#7c3aed","#92400e","#be123c","#166534"];
          const { digitRoot, is369 } = auraAnalysis;
          const C369 = { 3:"#a855f7", 6:"#f59e0b", 9:"#34d399" };
          const filtered = historySearch
            ? RAW_DATA.filter(d => d.period.toString().includes(historySearch) || d.date.includes(historySearch) || d.nums.some(n => String(n).padStart(2,"0").includes(historySearch)))
            : RAW_DATA;

          return (
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#f59e0b", marginBottom: 6 }}>📋 歷史開獎完整紀錄</div>
            <div style={{ fontSize: 13, color: "#64748b", marginBottom: 14 }}>
              共 <strong style={{color:"#34d399"}}>{RAW_DATA.length}</strong> 期資料｜
              第 <strong style={{color:"#94a3b8"}}>{RAW_DATA[RAW_DATA.length-1].period}</strong> 期 ~ 第 <strong style={{color:"#94a3b8"}}>{RAW_DATA[0].period}</strong> 期｜
              全部經過星期驗證 ✅
            </div>

            {/* 搜尋 */}
            <div style={{ marginBottom: 14 }}>
              <input
                type="text"
                placeholder="搜尋期號、日期或號碼..."
                value={historySearch}
                onChange={e => setHistorySearch(e.target.value)}
                style={{
                  width: "100%", padding: "10px 14px", borderRadius: 10,
                  background: "#0f1e35", border: "1px solid #1e3a5f",
                  color: "#e2e8f0", fontSize: 14, fontFamily: "inherit",
                  outline: "none",
                }}
              />
            </div>

            {/* 統計摘要 */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 14 }}>
              {[
                { label: "總期數", val: RAW_DATA.length, color: "#34d399" },
                { label: "最新期", val: RAW_DATA[0].period, color: "#f59e0b" },
                { label: "最早期", val: RAW_DATA[RAW_DATA.length-1].period, color: "#94a3b8" },
                { label: "涵蓋天數", val: Math.round((new Date(RAW_DATA[0].date) - new Date(RAW_DATA[RAW_DATA.length-1].date)) / 86400000), color: "#60a5fa" },
              ].map(({label,val,color}) => (
                <div key={label} style={{ background:"#0f1e35", border:"1px solid #1e3a5f", borderRadius:10, padding:"10px 8px", textAlign:"center" }}>
                  <div style={{ fontSize:18, fontWeight:900, color }}>{val}</div>
                  <div style={{ fontSize:10, color:"#64748b", marginTop:2 }}>{label}</div>
                </div>
              ))}
            </div>

            {/* 紀錄列表 */}
            <div style={{ background:"#0f1e35", border:"1px solid #1e3a5f", borderRadius:12, padding:12 }}>
              <div style={{ fontSize:11, color:"#64748b", marginBottom:10 }}>
                顯示 {filtered.length} 筆｜
                <span style={{color:"#a855f7"}}>■根3</span>
                <span style={{color:"#f59e0b",marginLeft:6}}>■根6</span>
                <span style={{color:"#34d399",marginLeft:6}}>■根9</span>
                <span style={{color:"#475569",marginLeft:6}}>■其他</span>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {filtered.map((d, i) => (
                  <div key={d.period} style={{
                    display:"flex", alignItems:"center", gap:6, flexWrap:"wrap",
                    padding:"8px 10px", borderRadius:8,
                    background: i===0 && !historySearch ? "rgba(245,158,11,0.08)" : "rgba(255,255,255,0.02)",
                    border: `1px solid ${i===0 && !historySearch ? "rgba(245,158,11,0.2)" : "transparent"}`,
                  }}>
                    <div style={{ display:"flex", flexDirection:"column", minWidth:52 }}>
                      <span style={{ fontSize:11, fontWeight:700, color: i===0&&!historySearch?"#f59e0b":"#64748b" }}>#{d.period}</span>
                      <span style={{ fontSize:10, color:"#475569" }}>{d.date}</span>
                    </div>
                    <span style={{
                      fontSize:10, padding:"2px 7px", borderRadius:12, fontWeight:700, color:"#fff",
                      background: COLORS[d.weekday], minWidth:36, textAlign:"center",
                    }}>週{WEEKDAY_NAMES[d.weekday]}</span>
                    <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                      {d.nums.map(n => {
                        const r = digitRoot(n);
                        const i3 = is369(n);
                        const c = i3 ? C369[r] : "#1e3a5f";
                        return (
                          <span key={n} style={{
                            width:32, height:32, lineHeight:"32px", textAlign:"center",
                            borderRadius:"50%", fontSize:12, fontWeight:700,
                            background: i3 ? `radial-gradient(circle,${c},${c}88)` : "rgba(255,255,255,0.07)",
                            color: i3 ? "#fff" : "#94a3b8",
                            border: `1px solid ${i3 ? c : "#1e3a5f"}`,
                          }}>{String(n).padStart(2,"0")}</span>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          );
        })()}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
